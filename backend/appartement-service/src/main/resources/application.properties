# Appartement Service - Configuration
spring.application.name=appartement-service
server.servlet.context-path=/
server.port=8081

# ========== JPA / HIBERNATE ==========
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========== DATABASE (H2 par défaut) ==========
spring.datasource.url=jdbc:h2:mem:appartement-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========== FLYWAY ==========
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true

# ========== LOGGING ==========
logging.level.root=WARN
logging.level.com.locagest=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/appartement-service.log
logging.file.max-size=10MB
logging.file.max-history=10

# ========== JACKSON ==========
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Paris
spring.jackson.default-property-inclusion=non_null

# ========== ERROR HANDLING ==========
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

